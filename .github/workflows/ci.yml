name: CI Workflow

on: 
  issues:
    types: [opened]

permissions:
    issues: write

jobs:
    ci-job:
        runs-on: ubuntu-latest
        steps:
            - name: Get the Actions
              uses: actions/checkout@v6
            - name: Run my own composite action
              id: my-action
              uses: ./
              with:
                who-to-greet: '@johanny'
            - name: Output the answer
              run: echo "The answer is ${{ steps.my-action.outputs.answer }}"
